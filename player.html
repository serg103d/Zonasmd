<script>

  const video = document.getElementById("video")
const playBtn = document.getElementById("play")
const prevBtn = document.getElementById("prev")
const nextBtn = document.getElementById("next")

const progress = document.getElementById("progress")
const progressContainer = document.getElementById("progressContainer")

const currentTimeEl = document.getElementById("current")
const durationEl = document.getElementById("duration")

const playlistContainer = document.getElementById("playlist")
const videoTitle = document.getElementById("videoTitle")

const totalEpisodesEl = document.getElementById("totalEpisodes")
const contentPlayer = document.getElementById('playerCtn')
const nameCach = document.getElementById('nameCach');

// obtener parámetros URL
function get(e, i) {
  i || (i = window.location.href)
  e = e.replace(/[\[\]]/g, "\\$&")
  var n = new RegExp("[?&]" + e + "(=([^&#]*)|&|#|$)").exec(i)
  return n ? n[2] ? decodeURIComponent(n[2].replace(/\+/g, " ")) : "" : null
}

let hlsGets = get("v");
let getPoster = get("p");
let videos = []
let currentIndex = 0
// clave de memoria por serie
const STORAGE_KEY = "serie_" + hlsGets

const M3U_URL = hlsGets

let names = ''
let showError = 'https://4ddig.tenorshare.com/images/video-repair/error-code-232404.jpg?w=850&h=522'

video.onerror = () => video.poster = showError

async function loadM3U(){

let res = await fetch(M3U_URL)
let text = await res.text()

parseM3U(text)

renderPlaylist()

updateCounter()

restoreProgress()

}

// parsear m3u
function parseM3U(text){

videos = []

let lines = text.split("\n")
let current = {}

lines.forEach(line=>{

line=line.trim()

if(line.startsWith("#EXTINF")){

let name = line.split(",")[1]

let subtitles = line.match(/sub-titles="(.*?)"/)
let idMatch = line.match(/nove-id="(.*?)"/)
let groupMatch = line.match(/group-title="(.*?)"/)

current = {
name:name,
subtitulo:subtitles ? subtitles[1] : "",
noveId:idMatch ? idMatch[1] : "",
season:groupMatch ? groupMatch[1] : "Lista de Capítulos"
}

}

else if(line && !line.startsWith("#")){

videos.push({
...current,
url:line
})

}

})

}

// renderizar playlist
function renderPlaylist(){

playlistContainer.innerHTML = ""

let seasons = {}

videos.forEach((v,i)=>{

if(!seasons[v.season]) seasons[v.season]=[]

seasons[v.season].push({...v,index:i})

})

for(let season in seasons){

let seasonDiv=document.createElement("div")
seasonDiv.className="season"

let title=document.createElement("div")
title.className="season-title"
title.textContent=season

seasonDiv.appendChild(title)

seasons[season].forEach(v=>{

let item=document.createElement("div")
item.className="item"

let imagens = document.createElement('img')
imagens.src = getPoster

imagens.onerror = () => imagens.src = '../icons/images.jpg'

let nameitem = document.createElement('span')
nameitem.textContent = names + v.name

item.onclick=()=>loadVideo(v.index)

item.appendChild(imagens)
item.appendChild(nameitem)

seasonDiv.appendChild(item)

})

playlistContainer.appendChild(seasonDiv)

}

}

// cargar subtítulos
function loadSub(index){

let v=videos[index]

let track = document.createElement("track")
track.src = v.subtitulo
track.srclang="es"
track.label="Español"
track.default=true

video.appendChild(track)

}

// cargar video
function loadVideo(index){
currentIndex=index

video.innerHTML=''

let v=videos[index]

video.src= v.url
posterCach.src = getPoster
posterCach.onerror = () => posterCach.src = '../icons/images.jpg'
loadSub(index)
document.querySelectorAll(".item").forEach(i => i.classList.remove("active"))
  document.querySelectorAll(".item")[index].classList.add("active")

video.poster = 'https://media1.giphy.com/media/v1.Y2lkPTZjMDliOTUyNW9lZXp1bHl4NjhlZTMwOHpoMXlrcXd0NnZ2bXJzcm1yZHk1dXJpcyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/uIJBFZoOaifHf52MER/200w.gif'

videoTitle.textContent= names + '-' + v.name
nameCach.value = videoTitle.textContent

if (video.pause) {
  video.play()
  playBtn.innerHTML='<i class="fa-solid fa-circle-pause"></i>'
}

saveProgress()
contentPlayer.classList.remove('mo')
}

// play pause
playBtn.onclick=()=>{

if(video.paused){

video.play()

playBtn.innerHTML='<i class="fa-solid fa-circle-pause"></i>'

}else{

video.pause()

playBtn.innerHTML='<i class="fa-brands fa-centercode"></i>'

}

}

// anterior
prevBtn.onclick=()=>{

if(currentIndex>0){

loadVideo(currentIndex-1)

}

}

// siguiente
nextBtn.onclick=()=>{

if(currentIndex<videos.length-1){

loadVideo(currentIndex+1)

}

}

// autoplay siguiente
video.addEventListener("ended",()=>{

if(currentIndex<videos.length-1){

loadVideo(currentIndex+1)

}

})


// guardar progreso
function saveProgress(){

let data = {

episode:currentIndex,
time:video.currentTime

}

localStorage.setItem(STORAGE_KEY,JSON.stringify(data))

}

// restaurar progreso
function restoreProgress(){

let data = localStorage.getItem(STORAGE_KEY)

if(!data){

loadVideo(0)
return

}

data = JSON.parse(data)

loadVideo(data.episode)

video.addEventListener("loadedmetadata",()=>{

video.currentTime = data.time
},{once:true})

}

// contador episodios
function updateCounter(){

if(totalEpisodesEl){

totalEpisodesEl.textContent = 'Capitulos: ' + videos.length

}

}

// progreso del video
video.addEventListener("timeupdate", updateProgress);

function updateProgress() {
  
  // evitar errores si duración no existe
  if (!video.duration || !isFinite(video.duration)) {
    durationEl.textContent = "♾️";
    currentTimeEl.textContent = formatTime(video.currentTime);
    return;
  }
  
  // calcular porcentaje
  const percent = (video.currentTime / video.duration) * 100;
  progress.style.width = percent + "%";
  
  // tiempos
  currentTimeEl.textContent = formatTime(video.currentTime);
  durationEl.textContent = formatTime(video.duration);
  
  // guardar progreso (se puede optimizar con throttle)
  saveProgress();
}


// click en barra de progreso
progressContainer.addEventListener("click", (e) => {
  
  if (!video.duration || !isFinite(video.duration)) return;
  
  const rect = progressContainer.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const width = rect.width;
  
  const percent = clickX / width;
  
  video.currentTime = percent * video.duration;
  
});


// formatear tiempo (hh:mm:ss)
function formatTime(time) {
  
  if (!isFinite(time)) return "0:00";
  
  const hours = Math.floor(time / 3600);
  const minutes = Math.floor((time % 3600) / 60);
  let seconds = Math.floor(time % 60);
  
  if (seconds < 10) seconds = "0" + seconds;
  
  if (hours > 0) {
    return hours + ":" + String(minutes).padStart(2, "0") + ":" + seconds;
  }
  
  return minutes + ":" + seconds;
}
loadM3U()
let countdown;
  let timeLeft = 0;
  
  function updateTimer() {
    const minutes = Math.floor(timeLeft / 60);
    const seconds = timeLeft % 60;
    document.getElementById('timer').textContent =
      `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    
    if (timeLeft > 0) {
      timeLeft--;
    } else {
      clearInterval(countdown);
      timeExpired();
    }
  }
  
  
  function startTimer() {
    clearInterval(countdown);
    countdown = setInterval(updateTimer, 1000);
  }
  
  function addTime(seconds) {
    timeLeft += seconds;
    if (timeLeft > 0 && !countdown) {
      startTimer();
    }
  }
  
  function timeExpired() {
    //alert("¡El tiempo ha expirado!");
    controlsCtn.classList.add('mo');
  }
  
  
  // Inicialización del temporizador
  const played = document.addEventListener('click', (e) => {
    controlsCtn.classList.remove('mo');
    startTimer();
  });
  
caps.addEventListener('click', (e) => {
  playerCtn.classList.add('mo');
});
capsAb.addEventListener('click', (e) => {
  playerCtn.classList.remove('mo');
});

function launchFullScreen(element) {
    if (element.requestFullScreen) {
      element.requestFullScreen();
    } else if (element.mozRequestFullScreen) {
      element.mozRequestFullScreen();
    } else if (element.webkitRequestFullScreen) {
      element.webkitRequestFullScreen();
    }
  }
  // Lanza en pantalla completa en navegadores que lo soporten
  function cancelFullScreen() {
    if (document.cancelFullScreen) {
      document.cancelFullScreen();
    } else if (document.mozCancelFullScreen) {
      document.mozCancelFullScreen();
    } else if (document.webkitCancelFullScreen) {
      document.webkitCancelFullScreen();
    }
  }
  
  
  const vfull = document.getElementById('fls_a');
  vfull.addEventListener('click', (e) => {
    fls_a.classList.toggle('kit');
    fls_c.classList.toggle('kit');
    
  });
  const vsmall = document.getElementById('fls_c');
  vsmall.addEventListener('click', (e) => {
    fls_a.classList.toggle('kit');
    fls_c.classList.toggle('kit');
    
  });
  /*
  function toggleFullscreen() {
  video.requestFullscreen();
}
fullVideo.onclick = () => toggleFullscreen();
*/
const continuar = document.getElementById('continuar');
const contCont = document.getElementById('ContCont');
function continues() {
    video.play();
    contCont.classList.add('mo');
  
}
continuar.onclick = () => continues();
</script>
